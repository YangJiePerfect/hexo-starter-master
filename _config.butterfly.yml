# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 阳介
subtitle: ''
description: ''
keywords:
author: 阳介
language: zh-CN


# 头像
avatar:
  img: /img/yoimiya-avatar-spherical.png
  effect: false
timezone: ''
# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://yangjie520.ccwu.cc
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/{YangJiePerfect}/{YangJiePerfect}.github.io.git
  branch: main

# 插入代码到头部 </head> 之前 和 底部 </body> 之前
inject:
  head:
    - <link rel="stylesheet" href="/css/header-video.css">
    - <link rel="stylesheet" href="/css/target-cursor.css">
    - <link rel="preconnect" href="https://fonts.googleapis.com">
    - <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    - <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=block" rel="stylesheet">
  bottom:
    - <script src="https://fastly.jsdelivr.net/npm/live2d-widgets@1.0.1/dist/autoload.js"></script>
    - <script>window.addEventListener('error',function(e){if(e.message&&e.message.indexOf('hitTest')!==-1){e.preventDefault();return true}})</script>
    - <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    - <script src="/js/header-video.js"></script>
    - <script src="/js/target-cursor.js"></script>
    - <script src="/js/cursor-toggle.js"></script>
    - <script>document.addEventListener('DOMContentLoaded',function(){var hide=document.getElementById('rightside-config-hide');if(hide&&!document.getElementById('cursor-toggle')){var btn=document.createElement('button');btn.id='cursor-toggle';btn.type='button';btn.title='切换鼠标特效';btn.setAttribute('aria-pressed','true');btn.innerHTML='<i class="fas fa-mouse-pointer"></i>';hide.appendChild(btn)}})</script>

# 作者卡片
aside:
  card_author:
    button:
      link: https://github.com/YangJiePerfect

# 页脚
footer:
  custom_text: Deployed On Cloudflare Pages<br>部分素材来源自miHoYo

# 搜索
search:
  use: local_search
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false

# 标签页面UI（使用首页样式）
tag_ui: index

# 页面加载动画
preloader:
  enable: false

# PJAX无刷新跳转
pjax:
  enable: true

# 入场动画
enter_transitions: true
